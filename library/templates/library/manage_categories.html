{% extends "library/base.html" %}
{% block title %}Manage Categories{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Manage Categories</h4>
    <a href="{% url 'add_category' %}" class="btn btn-primary btn-sm">+ Add New Category</a>
</div>
<table class="table table-bordered bg-white">
    <thead><tr><th>Name</th><th>Actions</th></tr></thead>
    <tbody>
    {% for c in categories %}
        <tr>
            <td>{{ c.name }}</td>
            <td><a href="{% url 'delete_category' c.pk %}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this category?')">Delete</a></td>
        </tr>
    {% empty %}
        <tr><td colspan="2" class="text-center">No categories added yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
