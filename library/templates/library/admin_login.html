{% extends "library/base.html" %}
{% load static %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<style>
    .admin-login-wrapper {
        background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('{% static "library/images/login_bg.jpg" %}');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .admin-login-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
</style>
<div class="admin-login-wrapper">
    <div class="col-md-5">
        <div class="card p-4 admin-login-card">
            <h3 class="text-center mb-4" style="color: #333;">Admin Login</h3>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Email ID</label>
                    {{ form.email }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="mt-3 text-center">
                <a href="{% url 'forgot_password' %}" class="text-decoration-none">Forgot Password?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
