{% extends "library/base.html" %}
{% block title %}Manage Authors{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Manage Authors</h4>
    <a href="{% url 'add_author' %}" class="btn btn-primary btn-sm">+ Add New Author</a>
</div>
<table class="table table-bordered bg-white">
    <thead><tr><th>Name</th><th>Actions</th></tr></thead>
    <tbody>
    {% for a in authors %}
        <tr>
            <td>{{ a.name }}</td>
            <td><a href="{% url 'delete_author' a.pk %}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this author?')">Delete</a></td>
        </tr>
    {% empty %}
        <tr><td colspan="2" class="text-center">No authors added yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
