{% if page_obj.paginator.num_pages > 1 %}
<nav class="mt-3">
    <ul class="pagination">
        {% if page_obj.has_previous %}
            <li class="page-item"><a class="page-link" href="?page={{ page_obj.previous_page_number }}{{ qs }}">Previous</a></li>
        {% endif %}
        {% for num in page_obj.paginator.page_range %}
            <li class="page-item {% if num == page_obj.number %}active{% endif %}">
                <a class="page-link" href="?page={{ num }}{{ qs }}">{{ num }}</a>
            </li>
        {% endfor %}
        {% if page_obj.has_next %}
            <li class="page-item"><a class="page-link" href="?page={{ page_obj.next_page_number }}{{ qs }}">Next</a></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
